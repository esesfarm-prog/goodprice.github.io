<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodprice | Home</title>
    <style>
        /* Basic Styling to make it look professional */
        body { font-family: sans-serif; margin: 0; line-height: 1.6; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background: #444; padding: 0.5rem; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .hero { background: #f4f4f4; padding: 40px; text-align: center; }
        .product-grid { display: flex; justify-content: space-around; padding: 20px; flex-wrap: wrap; }
        .product-card { border: 1px solid #ddd; padding: 15px; width: 200px; text-align: center; margin: 10px; }
        .btn { background: #28a745; color: white; padding: 10px; text-decoration: none; border-radius: 5px; }
        footer { text-align: center; padding: 20px; background: #eee; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Goodprice</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <section class="hero">
        <h2>Shop the Best Deals!</h2>
        <p>Browse our top-rated products at the best prices.</p>
    </section>
<div class="product-card slideshow-container">
    <!-- Image 1 (Visible by default) -->
    <img class="mySlides" src="dress.png" display:block;">
    <!-- Image 2 (Hidden by default) -->
    <img class="mySlides" src="dress 2.png" display:none;">
    <!-- Image 3 (Hidden by default) -->
    <img class="mySlides" src="dress.png" display:none;">
    
    <h3>Featured Collection</h3>
    <p>New arrivals every week</p>
    <a href="#" class="btn">View All</a>
</div>

    <section class="product-grid">
       
    </section>

    <footer>
        <p>&copy; 2026 My Online Store</p>
    </footer>
 <script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        
        // Hide all images
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        
        slideIndex++;
        
        // Reset to first image if at the end
        if (slideIndex > slides.length) {slideIndex = 1}    
        
        // Show the current image
        slides[slideIndex-1].style.display = "block";  
        
        // Run again in 3 seconds (3000ms)
        setTimeout(showSlides, 3000); 
    }
</script>
</body>
</html>
