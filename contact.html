<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Good Price Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; line-height: 1.6; color: #333; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background: #444; padding: 0.5rem; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { max-width: 600px; margin: auto; padding: 40px 20px; }
        form { display: flex; flex-direction: column; background: #f9f9f9; padding: 25px; border-radius: 8px; border: 1px solid #ddd; }
        label { font-weight: bold; margin-bottom: 5px; }
        input, textarea { margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn { background: #28a745; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn:hover { background: #218838; }
        footer { text-align: center; padding: 20px; background: #eee; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>Good Price Store</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <h2>Contact Us</h2>
        <p>Send a message and we will get back to you at esesfarm@gmail.com</p>
        
        <!-- THE FORM STARTS HERE -->
        <form action="https://formsubmit.co/esesfarm@gmail.com" method="POST">
           <!-- This sends the user back to your site instead of a random page -->

            <!-- Honeypot to stop spam -->
            <input type="text" name="_honey" style="display:none">
            
            <!-- Redirect back to your site after they send the message -->
            <input type="hidden" name="_next" value="https://github.io/goodprice.github.com">

            <label for="name">Your Name</label>
            <input type="text" name="name" id="name" required placeholder="Enter your full name">

            <label for="email">Your Email Address</label>
            <input type="email" name="email" id="email" required placeholder="so we can reply to you">

            <label for="message">Your Message</label>
            <textarea name="message" id="message" rows="5" required placeholder="What are you looking to buy?"></textarea>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Good Price Store</p>
    </footer>

</body>
</html>
